<!DOCTYPE html>
<html>
<head>
  <title>Sejal Cloudflare Project</title>
</head>
<body>
  <h1>Frontend Deployed on Cloudflare Pages </h1>

  <button onclick="callAPI()">Call Backend</button>

  <p id="result"></p>

  <script>
    async function callAPI() {
      try {
        const res = await fetch("https://sejal-backend-worker.sejalthakur016.workers.dev");
        const text = await res.text();
        document.getElementById("result").innerText = text;
      } catch (error) {
        document.getElementById("result").innerText = "Error calling backend";
      }
    }
  </script>

</body>
</html>

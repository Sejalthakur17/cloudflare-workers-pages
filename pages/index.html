<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Cloudflare Full Stack App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 14px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 15px 0;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #2a5298;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1e3c72;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .error {
      color: red;
    }

    .loading {
      color: #2a5298;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Cloudflare Full Stack App</h1>
    <p>Enter a number. Backend will multiply it by 5.</p>

    <input type="number" id="numberInput" placeholder="Enter number" />

    <br />
    <button onclick="calculate()">Calculate</button>

    <div id="message" class="result"></div>
  </div>

  <script>
    async function calculate() {
      const input = document.getElementById("numberInput").value;
      const messageDiv = document.getElementById("message");

      if (!input) {
        messageDiv.innerHTML = "⚠ Please enter a number.";
        messageDiv.className = "result error";
        return;
      }

      messageDiv.innerHTML = "⏳ Calculating...";
      messageDiv.className = "result loading";

      try {
        const response = await fetch("https://sejal-backend-worker.sejalthakur016.workers.dev/calculate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ number: Number(input) })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Something went wrong");
        }

        messageDiv.innerHTML = `✅ Result: ${data.result}`;
        messageDiv.className = "result";

      } catch (error) {
        messageDiv.innerHTML = `❌ ${error.message}`;
        messageDiv.className = "result error";
      }
    }
  </script>

</body>
</html>

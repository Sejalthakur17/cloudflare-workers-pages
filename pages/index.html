<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cloudflare Full Stack Demo</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background-color: #f4f6f8;
    }

    input {
      padding: 8px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      margin-left: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Cloudflare Full Stack App 🚀</h1>
  <p>Enter a number. Backend will multiply it by 5.</p>

  <input type="number" id="numberInput" placeholder="Enter a number" />
  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>

  <script>
    async function calculate() {
      const number = document.getElementById("numberInput").value;

      const res = await fetch("https://sejal-backend-worker.sejalthakur016.workers.dev", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ number: Number(number) })
      });

      const data = await res.json();

      document.getElementById("result").innerText =
        "Result: " + data.output;
    }
  </script>

</body>
</html>
